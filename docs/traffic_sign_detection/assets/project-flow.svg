<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="260" viewBox="0 0 1680 260" role="img" aria-labelledby="title desc">
  <title id="title">项目流程图</title>
  <desc id="desc">从 CARLA 仿真环境到检测结果的交通标志检测项目流程图。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
      .text { fill: #0f172a; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 23px; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="260" />

  <rect class="node" x="20" y="70" width="180" height="120" />
  <text class="text" x="110" y="123" text-anchor="middle">CARLA</text>
  <text class="text" x="110" y="157" text-anchor="middle">仿真环境</text>

  <rect class="node" x="230" y="70" width="250" height="120" />
  <text class="text" x="355" y="123" text-anchor="middle">main.py</text>
  <text class="text" x="355" y="157" text-anchor="middle">场景构建与自动采集</text>

  <rect class="node" x="510" y="70" width="220" height="120" />
  <text class="text" x="620" y="123" text-anchor="middle">PNG 图像</text>
  <text class="text" x="620" y="157" text-anchor="middle">XML 标注</text>

  <rect class="node" x="760" y="70" width="320" height="120" />
  <text class="text" x="920" y="123" text-anchor="middle">xml_to_yolo_dataset.py</text>
  <text class="text" x="920" y="157" text-anchor="middle">数据清洗与格式转换</text>

  <rect class="node" x="1110" y="70" width="260" height="120" />
  <text class="text" x="1240" y="108" text-anchor="middle">YOLO 数据集</text>
  <text class="text" x="1240" y="142" text-anchor="middle">images / labels /</text>
  <text class="text" x="1240" y="176" text-anchor="middle">dataset.yaml</text>

  <rect class="node" x="1400" y="20" width="240" height="100" />
  <text class="text" x="1520" y="62" text-anchor="middle">YOLO 模型</text>
  <text class="text" x="1520" y="96" text-anchor="middle">训练与导出</text>

  <rect class="node" x="1400" y="140" width="240" height="50" />
  <text class="text" x="1520" y="172" text-anchor="middle">ONNX 模型</text>

  <rect class="node" x="1400" y="210" width="240" height="100" transform="translate(0,-50)" />
  <text class="text" x="1520" y="232" text-anchor="middle">detector_onnx.py</text>
  <text class="text" x="1520" y="266" text-anchor="middle">推理与可视化验证</text>

  <rect class="node" x="1110" y="210" width="260" height="100" transform="translate(0,-50)" />
  <text class="text" x="1240" y="232" text-anchor="middle">图片 / 视频</text>
  <text class="text" x="1240" y="266" text-anchor="middle">检测结果</text>

  <line class="arrow" x1="200" y1="130" x2="230" y2="130" />
  <line class="arrow" x1="480" y1="130" x2="510" y2="130" />
  <line class="arrow" x1="730" y1="130" x2="760" y2="130" />
  <line class="arrow" x1="1080" y1="130" x2="1110" y2="130" />
  <line class="arrow" x1="1370" y1="115" x2="1400" y2="70" />
  <line class="arrow" x1="1520" y1="120" x2="1520" y2="140" />
  <line class="arrow" x1="1520" y1="190" x2="1520" y2="210" />
  <line class="arrow" x1="1400" y1="240" x2="1370" y2="240" />
</svg>
