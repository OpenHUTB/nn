site_name: 神经网络实现代理
site_description: 利用神经网络/ROS 实现 Carla、AirSim、Mujoco 中人和载具的代理
site_author: OpenHUTB
site_url: https://github.com/OpenHUTB/nn

# 仓库链接
repo_name: OpenHUTB/nn
repo_url: https://github.com/OpenHUTB/nn
edit_uri: edit/master/docs/

# ========================================
# 主题配置 (使用 Material 主题，功能更强大)
# ========================================
theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs        # 顶部标签页导航
    - navigation.sections  # 导航分组
    - navigation.expand    # 导航展开
    - navigation.top        # 返回顶部按钮
    - search.suggest        # 搜索建议
    - search.highlight      # 搜索高亮
    - content.code.copy     # 代码复制按钮
    - content.action.edit   # 编辑页面链接
    - content.action.view   # 查看源文件链接

# ========================================
# 扩展功能
# ========================================
markdown_extensions:
  # 代码高亮
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences  # 更好的代码块嵌套

  # 提示框
  - admonition
  - pymdownx.details       # 可折叠提示框
  - pymdownx.mark           # 高亮标记 ==text==

  # 表格
  - tables

  # 公式
  - pymdownx.arithmatex:
      generic: true

  # 任务列表
  - pymdownx.tasklist:
      custom_checkbox: true

  # 引用
  - pymdownx.blockquote

  # 符号替换
  - pymdownx.smartsymbols

  # 目录
  - toc:
      permalink: true
      toc_depth: 3

# ========================================
# 插件
# ========================================
plugins:
  - search:
      lang:
        - en
        - zh
      separator: '[\s\-\.]+'
      prebuild_index: true
  - roamlinks          # 支持 [[wiki链接]] 格式
  - tags:               # 标签功能
      enabled: true

# ========================================
# 额外配置
# ========================================
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/OpenHUTB
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_ID

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js

# ========================================
# 导航结构
# ========================================
nav:
  - 首页: index.md
  - 基础教程:
      - warmup/index.md
      - linear_regression.md
      - softmax_regression.md
      - simple_nn.md
      - CNN.md
      - RNN.md
      - svm.md
      - gaussian_mixture.md
      - RBM.md
      - attention.md
      - RL.md
  - 感知:
      - perception/index.md
  - 规划:
      - planning/index.md
  - 控制:
      - control/index.md